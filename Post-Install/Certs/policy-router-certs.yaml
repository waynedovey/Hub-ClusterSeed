apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-router-certs-local-cluster
  namespace: default
  annotations:
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
    policy.open-cluster-management.io/standards: NIST SP 800-53
  generation: 1
spec:
  disabled: false
  remediationAction: enforce
  severity: low
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: policy-router-certs-ingress-local-cluster
        spec:
          namespaceSelector:
            include:
              - kube-system
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: bitnami.com/v1alpha1
                kind: SealedSecret
                metadata:
                  name: router-certs
                  namespace: openshift-ingress
                  annotations:
                    sealedsecrets.bitnami.com/cluster-wide: "true"
                  creationTimestamp:
                spec:
                  encryptedData:
                    tls.crt: 
                    tls.key: 
                  template:
                    metadata:
                      name: router-certs
                      namespace: openshift-ingress
                      annotations:
                        sealedsecrets.bitnami.com/cluster-wide: "true"
                      creationTimestamp:
                    type: kubernetes.io/tls

    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: policy-router-ingress-operator-local-cluster
        spec:
          namespaceSelector:
            include:
              - kube-system
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operator.openshift.io/v1
                kind: IngressController
                metadata:
                  name: default
                  namespace: openshift-ingress-operator
                spec:
                  clientTLS:
                    clientCA:
                      name: ""
                    clientCertificatePolicy: ""
                  defaultCertificate:
                    name: router-certs
                  httpCompression: {}
                  httpEmptyRequestsPolicy: Respond
                  httpErrorCodePages:
                    name: ""
                  replicas: 2
                  tuningOptions:
                    reloadInterval: 0s
                  unsupportedConfigOverrides: null
                status: {}
---
apiVersion: apps.open-cluster-management.io/v1
kind: PlacementRule
metadata:
  name: policy-router-certs-local-cluster-placement
  namespace: default
spec:
  clusterSelector:
    matchExpressions:
      - key: name
        operator: In
        values:
          - local-cluster
  clusterConditions: []
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: policy-router-certs-local-cluster-placement-binding
  namespace: default
placementRef:
  name: policy-router-certs-local-cluster-placement
  apiGroup: apps.open-cluster-management.io
  kind: PlacementRule
subjects:
  - name: policy-router-certs-local-cluster
    apiGroup: policy.open-cluster-management.io
    kind: Policy
